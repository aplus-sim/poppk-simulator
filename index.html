<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PopPK Profile Simulator</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --border:#334155; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", system-ui, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:18px 24px; background:linear-gradient(90deg,#0ea5e9,#6366f1); color:#fff; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; font-size:13px; opacity:.9; }
  .layout { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .controls { flex:0 0 340px; }
  .plotwrap { flex:1 1 560px; min-width:480px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input, select { width:100%; padding:7px 9px; background:#0b1220; color:var(--text);
    border:1px solid var(--border); border-radius:6px; font-size:14px; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  button { margin-top:14px; width:100%; padding:10px; background:var(--accent); color:#06283d;
    border:none; border-radius:7px; font-weight:600; font-size:14px; cursor:pointer; }
  button.secondary { background:#475569; color:#fff; margin-top:8px; }
  button:hover { filter:brightness(1.08); }
  .toggle { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .toggle input { width:auto; }
  #status { font-size:12px; color:var(--muted); margin-top:10px; min-height:16px; }
  .pill { display:inline-block; padding:2px 8px; background:#0b1220; border:1px solid var(--border);
    border-radius:12px; font-size:11px; color:var(--accent); margin:2px 4px 2px 0; }
  .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:10.5px; font-weight:600; margin-left:6px; }
  .badge.curated { background:#134e2e; color:#4ade80; border:1px solid #166534; }
  .badge.nonlin { background:#4a2f10; color:#fbbf24; border:1px solid #854d0e; }
  table.params { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
  table.params td { padding:3px 6px; border-bottom:1px solid var(--border); }
  table.params td:first-child { color:var(--muted); }
  details { margin-top:12px; }
  summary { cursor:pointer; font-size:13px; color:var(--accent); }
  h3 { margin:0 0 4px; font-size:15px; }
  .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
  .mcard { background:#0b1220; border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .mlab { font-size:11px; color:var(--muted); }
  .mval { font-size:17px; font-weight:700; margin-top:2px; }
  .mval span { font-size:11px; color:var(--muted); font-weight:400; }
  .mnote { font-size:11px; color:var(--muted); margin-top:8px; }
  .mtitle { font-size:12px; color:var(--accent); margin-top:14px; font-weight:600; }
  input.ph { border-color:#a16207 !important; background:#2a2110; }   /* 예시(placeholder)값 */
</style>
</head>
<body>
<header>
  <h1>PopPK 농도-시간 프로파일 시뮬레이터</h1>
  <p>데이터 주도 엔진 · mAb 라이브러리(PPKPARAMETER.csv) + curated 상세모델(Eculizumab·Adalimumab, IIV/PD 포함) · Monte-Carlo 변동성</p>
</header>

<div class="layout">
  <div class="panel controls">
    <h3>1. 파라미터 소스</h3>
    <div id="status">CSV 로딩 중...</div>
    <label>라이브러리(PPKPARAMETER.csv) 직접 선택</label>
    <input type="file" id="libFile" accept=".csv">
    <label>curated 상세 파라미터(extracted_poppk_params.csv) 직접 선택</label>
    <input type="file" id="csvFile" accept=".csv">
    <label>승인 용법(regimen.csv) 직접 선택</label>
    <input type="file" id="regFile" accept=".csv">

    <h3 style="margin-top:18px;">2. 약물 / 모델</h3>
    <label>약물</label>
    <select id="drug"></select>
    <label style="margin-top:8px;">모델 (논문/참조)</label>
    <select id="model"></select>
    <div id="modelDesc" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>

    <h3 style="margin-top:18px;">3. 투여 설정</h3>
    <div id="doseSource" style="font-size:11.5px;margin:2px 0 6px;"></div>
    <div class="row">
      <div><label>1회 용량 (mg)</label><input type="number" id="dose" value="900" step="any"></div>
      <div><label id="ivLabel">주입시간 (h)</label><input type="number" id="tinf" value="0.5" step="any"></div>
    </div>
    <div class="row">
      <div><label id="intervalLabel">투여 간격 (h)</label><input type="number" id="tau" value="168" step="any"></div>
      <div><label>투여 횟수</label><input type="number" id="ndose" value="4" step="1" min="1"></div>
    </div>
    <div class="row">
      <div><label id="simEndLabel">시뮬레이션 종료 (h)</label><input type="number" id="tend" value="1344" step="any"></div>
      <div><label>가상환자 수 (N)</label><input type="number" id="nsub" value="300" step="50" min="1"></div>
    </div>
    <div class="row">
      <div><label id="cvLabel">가정 IIV %CV (라이브러리 전용)</label><input type="number" id="assumedcv" value="30" step="any" min="0"></div>
    </div>

    <h3 style="margin-top:18px;">4. 공변량 <span style="font-size:11px;color:var(--muted);font-weight:400">(모델별 자동 생성)</span></h3>
    <div id="covBox"></div>
    <div id="covNote" style="font-size:11.5px;color:var(--muted);margin-top:6px;"></div>

    <div class="toggle"><input type="checkbox" id="mc" checked><label style="margin:0">Monte-Carlo 변동성 (5–95% 밴드)</label></div>
    <div class="toggle"><input type="checkbox" id="logy"><label style="margin:0">세미로그 (log Y)</label></div>

    <button id="run">시뮬레이션 실행 ▶</button>
    <button id="export" class="secondary">결과 CSV 내보내기 ⬇</button>

    <details>
      <summary>현재 모델 파라미터 보기</summary>
      <table class="params" id="paramTable"></table>
    </details>
  </div>

  <div class="panel plotwrap">
    <div id="plot" style="width:100%;height:600px;"></div>
    <div id="metrics"></div>
    <div id="plotNote" style="font-size:11.5px;color:var(--muted);margin-top:8px;"></div>
  </div>
</div>

<script>
// ================================================================
//  데이터 주도 PK 엔진
//  - curated: extracted_poppk_params.csv (long) → IIV/상관/PD 포함 상세 2종
//  - library: PPKPARAMETER.csv (wide)  → mAb 69종 / 모델 160개 (point est.+공변량)
//  구조(구획수·흡수·경로)는 CSV 컬럼에서 자동 판별한다.
// ================================================================

let DRUGS = {};        // DRUGS[drugName] = [modelObj, ...]
let PARAMS = {};       // curated 원본 파라미터 (PARAMS[drug][key] = {estimate,rse,description})
let REGIMEN = {};      // REGIMEN[drug] = {dose_mg, interval_day, route, infusion_h, indication} (승인 용법)
let CURRENT = null;    // 현재 선택된 모델 객체
let lastResult = null;

function setStatus(msg, ok){ const s=document.getElementById('status'); s.textContent=msg; s.style.color = ok? '#4ade80':'#94a3b8'; }
function num(x){ if(x==null) return null; const s=String(x).trim(); if(s===''||s.toUpperCase()==='NA') return null; const v=parseFloat(s); return isNaN(v)?null:v; }
function shortRef(u){ if(!u) return 'ref'; const parts=String(u).split('doi.org/'); return (parts[1]||u).replace(/^https?:\/\//,'').slice(0,30); }

// 파라미터명을 논문 표 구획으로 분류: θ(구조) / η(IIV) / cov(공변량) / other(오차·PD 등)
function classifyParam(name){
  const n=String(name).toLowerCase();
  if(n.startsWith('iiv') || n.includes('corr') || n.startsWith('omega') || n.includes('iov')) return 'eta';
  if(n.includes('_wt') || n.includes('wt_') || n.includes('sx_') || n.includes('sex') || n.includes('_alb') || n.includes('alb_') || n.includes('_ada')) return 'cov';
  if(n.startsWith('prop') || n.startsWith('add') || n.includes('error') || n.includes('sigma')) return 'other';
  if(['kin','kout','c50','ic50','das28_0','imax','emax'].includes(n)) return 'other';
  return 'theta';
}

// ---------- curated 상세 모델 정의 (공변량 구조는 약물 특이적이라 여기 명시) ----------
const CURATED = {
  eculizumab: {
    label: "Eculizumab — 2-compartment, IV infusion (curated)",
    refText: "Eculizumab_POPPK.pdf — Table 3",
    timeUnit:"h", timeLabel:"h", concUnit:"mg/L",
    structure:{ cmt:2, absorption:false },
    note:"CL=θ1·(WT/80.9)^θ7 , Vc=θ2·(WT/80.9)^θ8 (healthy). 단위: L/h, L.",
    build(P, inp){
      const wt=inp.wt;
      return { CL:P.CL*Math.pow(wt/80.9, P.theta7_WT_CL),
               Vc:P.Vc*Math.pow(wt/80.9, P.theta8_WT_Vc),
               Vp:P.Vp, Q:P.Q, ka:null, F:1 };
    },
    covMeta:{ usesWt:true, refSize:80.9, sizeDesc:'BW', usesSex:false, usesAlb:false },
    iiv:{ CL:"IIV_CL", Vc:"IIV_Vc", Vp:"IIV_Vp" },
    corr:{ a:"CL", b:"Vc", rho:"corr_CL_Vc" },
    defaults:{ dose:900, tinf:0.5, tau:168, ndose:4, tend:1344, wt:80.9 }
  },
  adalimumab: {
    label: "Adalimumab — 1-compartment, first-order absorption (SC, curated)",
    refText: "22_Ternant_2014_POPPK.pdf — Table 2",
    timeUnit:"day", timeLabel:"day", concUnit:"mg/L",
    structure:{ cmt:1, absorption:true },
    note:"CL/F = θ·exp(SX_CL·sex)·(WT/70)^WT_CL. 단위: L/day, L. (SC, apparent 값)",
    build(P, inp){
      const wt=inp.wt, sex=inp.sex||0;
      return { CL:P["CL/F"]*Math.exp((P.SX_CL||0)*sex)*Math.pow(wt/70,(P.WT_CL||0)),
               Vc:P["V/F"], Vp:null, Q:null, ka:P.ka, F:1 };
    },
    covMeta:{ usesWt:true, refSize:70, sizeDesc:'BW', usesSex:true, sexDir:'M', usesAlb:false },
    iiv:{ CL:"IIV_CL", Vc:"IIV_Vd" },
    corr:null,
    defaults:{ dose:40, tinf:0, tau:14, ndose:8, tend:168, wt:70 }
  },
  pembrolizumab: {
    label: "Pembrolizumab (Keytruda) — 2-compartment IV · curated(IIV+cov)",
    brand:"Keytruda",
    refText: "Keytruda_PK_parameter.csv (사용자 제공)",
    timeUnit:"day", timeLabel:"day", concUnit:"mg/L",
    structure:{ cmt:2, absorption:false },
    note:"CL=0.202·(WGT/76.8)^0.578·(ALB/39.6)^-0.854·[여성 ×0.848]; Vc=3.48·(WGT/76.8)^0.492·(ALB/39.6)^-0.178·[여성 ×0.866]. 단위 L/day. (추가 공변량 BSLD·eGFR·암종·ECOG·IPI는 데이터엔 있으나 앱 미적용)",
    build(P, inp){
      const wt=inp.wt, sex=(inp.sex||0), alb=(inp.alb!=null?inp.alb:39.6);
      const fem = sex===0 ? 1 : 0;   // 앱: 0=여성
      return { CL: P.CL*Math.pow(wt/76.8,P.CL_WT)*Math.pow(alb/39.6,P.CL_ALB)*(fem?(1+P.CL_SEX):1),
               Vc: P.Vc*Math.pow(wt/76.8,P.VC_WT)*Math.pow(alb/39.6,P.VC_ALB)*(fem?(1+P.VC_SEX):1),
               Vp: P.Vp, Q: P.Q, ka:null, F:1 };
    },
    covMeta:{ usesWt:true, refSize:76.8, sizeDesc:'BW', usesSex:true, sexDir:'F', usesAlb:true, refAlb:39.6 },
    iiv:{ CL:"IIV_CL", Vc:"IIV_Vc" },
    corr:null,
    defaults:{ dose:200, tinf:0.5, tau:21, ndose:6, tend:168, wt:76.8 }
  }
};

// ---------- curated CSV(long) 파싱 ----------
function ingestCurated(text){
  const parsed = Papa.parse(text.trim(), {header:true, skipEmptyLines:true});
  PARAMS = {};
  parsed.data.forEach(r=>{
    const d=(r.drug||'').trim(), p=(r.parameter||'').trim(); if(!d||!p) return;
    (PARAMS[d]=PARAMS[d]||{})[p] = { estimate:num(r.estimate), rse:num(r.rse), description:r.description||'' };
  });
  Object.keys(CURATED).forEach(drug=>{
    if(!PARAMS[drug]) return;
    const C=CURATED[drug];
    const P={}; for(const k in PARAMS[drug]) P[k]=PARAMS[drug][k].estimate;
    addModel({
      drug, source:'curated', label:C.label, ref:'curated',
      timeUnit:C.timeUnit, timeLabel:C.timeLabel, concUnit:C.concUnit,
      structure:C.structure, note:C.note, nonlin:false, N:null, brand:C.brand, refText:C.refText,
      iiv:C.iiv, corr:C.corr, defaults:C.defaults, covMeta:C.covMeta,
      build:(inp)=>C.build(P, inp),
      paramRows:()=>Object.keys(PARAMS[drug]).map(k=>{
        const P0=PARAMS[drug][k], desc=P0.description||'';
        const m=desc.match(/\(([^)]*)\)/g);                    // description 끝 괄호 = 단위
        const unit=m ? m[m.length-1].replace(/[()]/g,'').trim() : '';
        return [ k + (unit?` (${unit})`:''), P0.estimate,
                 'RSE '+(P0.rse==null?'–':P0.rse)+'%', classifyParam(k) ];
      })
    });
  });
}

// ---------- library CSV(wide) 파싱 : 한 행 = 한 모델 ----------
function ingestLibrary(text){
  const parsed = Papa.parse(text.trim(), {header:true, skipEmptyLines:true});
  parsed.data.forEach(r=>{
    const drug=(r.mAb||'').trim(); if(!drug) return;
    const base={ CL:num(r.CL), Vc:num(r.VC), Vp:num(r.VP), Q:num(r.Q), ka:num(r.ka), F:num(r.F), Km:num(r.Km), Vm:num(r.Vm) };
    if(base.CL==null || base.Vc==null) return;   // 최소 CL·Vc 필요
    const cmt = (base.Vp!=null && base.Q!=null && base.Q>0) ? 2 : 1;
    const absorption = (base.ka!=null);
    const route = (r.Route||'').trim();
    const nonlin = (String(r.NonLin).trim()==='1') || (r.TMDD && String(r.TMDD).trim()!=='' && String(r.TMDD).trim().toUpperCase()!=='NA');
    const hasMM = (base.Km!=null && base.Vm!=null);   // Km·Vm 둘 다 있어야 MM 소실 계산 가능
    const cov={ CL_WT:num(r.CL_WT), VC_WT:num(r.VC_WT), VP_WT:num(r.VP_WT), Q_WT:num(r.Q_WT),
                CL_SEX:num(r.CL_SEX), VC_SEX:num(r.VC_SEX), VP_SEX:num(r.VP_SEX), sexDir:(r.SEX||'').trim().toUpperCase(),
                CL_ALB:num(r.CL_ALB), VC_ALB:num(r.VC_ALB), VP_ALB:num(r.VP_ALB), refAlb:num(r.ALB),
                sizeDesc:(r['Size descriptor']||'').trim(), refSize:num(r['Ref size']) };
    const useWt = cov.refSize!=null && cov.refSize>0 && /BW|WT|LBW|FFM/i.test(cov.sizeDesc);
    const hasWtCov = (cov.CL_WT!=null||cov.VC_WT!=null||cov.VP_WT!=null||cov.Q_WT!=null);
    const covMeta={
      usesWt: useWt && hasWtCov,
      sizeUnused: hasWtCov && !useWt,   // 크기 공변량이 데이터엔 있으나 BSA 등이라 미적용
      refSize:cov.refSize, sizeDesc:cov.sizeDesc,
      usesSex: (cov.CL_SEX!=null||cov.VC_SEX!=null||cov.VP_SEX!=null) && (cov.sexDir==='M'||cov.sexDir==='F'),
      sexDir:cov.sexDir,
      usesAlb: (cov.CL_ALB!=null||cov.VC_ALB!=null||cov.VP_ALB!=null) && cov.refAlb!=null,
      refAlb:cov.refAlb
    };
    // 표시용 라벨 — 검증된 가정을 명시:
    //  · SC(흡수): F값 있는 모델은 전부 Route=s.c./i.v.(IV데이터로 true CL 추정) → dose*F 적용이 옳음
    //  · MM: 원논문 CL을 "선형 성분"으로 간주하고 MM과 병렬. Km은 mg/L 가정(이상치는 경고).
    const absLabel = absorption ? `first-order absorption (${route||'SC'}${base.F!=null?`, F=${base.F} 적용`:''})` : 'IV';
    const mmLabel = hasMM
      ? ` · 비선형 MM 소실 (선형 CL과 병렬; Km=${base.Km}${(base.Km>100)?' ⚠단위확인':''}, Vm=${base.Vm})`
      : (nonlin ? ' · 비선형 플래그(MM 파라미터 없음 → 선형근사)' : '');
    addModel({
      drug, source:'library', ref:shortRef(r.Reference), refUrl:(r.Reference||'').trim(),
      timeUnit:'day', timeLabel:'day', concUnit:'mg/L',
      structure:{ cmt, absorption }, route, nonlin, hasMM, N:num(r.N),
      Km:base.Km, Vm:base.Vm, iiv:null, corr:null, cov, covMeta,
      note:`${cmt}-compartment · ${absLabel}${mmLabel} · 시뮬 단위 L/day 가정(원데이터 단위 미표기). Ref: ${(r.Reference||'').trim()}`,
      defaults:{ dose:300, tinf:0, tau:21, ndose:4, tend:126, wt:(cov.refSize||70) },
      build(inp){
        const wt=inp.wt, sex=inp.sex||0, alb=inp.alb;
        const sexFlag = ((cov.sexDir==='M'&&sex===1)||(cov.sexDir==='F'&&sex===0)) ? 1 : 0;
        const fWt =(exp)=> (useWt && exp!=null) ? Math.pow(wt/cov.refSize, exp) : 1;
        const fAlb=(exp)=> (cov.refAlb!=null && alb!=null && exp!=null) ? Math.pow(alb/cov.refAlb, exp) : 1;
        const fSex=(coef)=> (coef!=null) ? Math.exp(coef*sexFlag) : 1;
        return { CL:base.CL*fWt(cov.CL_WT)*fAlb(cov.CL_ALB)*fSex(cov.CL_SEX),
                 Vc:base.Vc*fWt(cov.VC_WT)*fAlb(cov.VC_ALB)*fSex(cov.VC_SEX),
                 Vp:base.Vp!=null?base.Vp*fWt(cov.VP_WT)*fAlb(cov.VP_ALB)*fSex(cov.VP_SEX):null,
                 Q:base.Q!=null?base.Q*fWt(cov.Q_WT):null,
                 ka:base.ka, F:(base.F!=null?base.F:1) };
      },
      paramRows(){
        // 원데이터(PPKPARAMETER.csv)에 단위 컬럼이 없으므로 단위를 표기하지 않음
        const rows=[['CL',base.CL,'','theta'],['Vc',base.Vc,'','theta']];
        if(base.Vp!=null) rows.push(['Vp',base.Vp,'','theta']);
        if(base.Q!=null) rows.push(['Q',base.Q,'','theta']);
        if(base.ka!=null) rows.push(['ka',base.ka,'','theta']);
        if(base.F!=null) rows.push(['F',base.F,'','theta']);
        if(base.Km!=null) rows.push(['Km',base.Km,'MM','theta']);
        if(base.Vm!=null) rows.push(['Vm',base.Vm,'MM','theta']);
        if(cov.CL_WT!=null) rows.push(['CL_WT exp',cov.CL_WT,cov.sizeDesc,'cov']);
        if(cov.VC_WT!=null) rows.push(['VC_WT exp',cov.VC_WT,cov.sizeDesc,'cov']);
        if(cov.VP_WT!=null) rows.push(['VP_WT exp',cov.VP_WT,cov.sizeDesc,'cov']);
        if(cov.CL_SEX!=null) rows.push(['CL_SEX',cov.CL_SEX,'sex='+cov.sexDir,'cov']);
        if(cov.CL_ALB!=null) rows.push(['CL_ALB exp',cov.CL_ALB,'ref '+cov.refAlb,'cov']);
        if(cov.refSize!=null) rows.push(['Ref size',cov.refSize,cov.sizeDesc,'cov']);
        if(this.N!=null) rows.push(['N (subjects)',this.N,'','other']);
        return rows;
      }
    });
  });
}

// ---------- 승인 용법(regimen.csv) 파싱: 약물별 대표 용법 ----------
function ingestRegimen(text){
  const parsed = Papa.parse(text.trim(), {header:true, skipEmptyLines:true});
  REGIMEN = {};
  parsed.data.forEach(r=>{
    const d=(r.mAb||'').trim().toLowerCase(); if(!d) return;
    REGIMEN[d] = { dose_mg:num(r.dose_mg), interval_day:num(r.interval_day),
                   route:(r.route||'').trim(), infusion_h:num(r.infusion_h), indication:(r.indication||'').trim() };
  });
}

  });

// ---------- 난수 (Box–Muller) ----------
function randn(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function omega(cvPct){ if(cvPct==null||isNaN(cvPct)) return 0; const cv=cvPct/100; return Math.sqrt(Math.log(1+cv*cv)); }

// ---------- 범용 ODE 시뮬 (RK4) : 1/2구획 × IV/흡수 ----------
// 상태 y = [depot, central, periph]

// 이벤트 인식형 시간 격자: 균일 coarse + 투여시점/주입구간 세분(피크 시점 정확 포함).
// dosing에만 의존 → 모든 개체가 동일 격자 공유(밴드 계산 정합).
function buildTimeGrid(dosing){
  const { tinf, tau, ndose, tend } = dosing;
  if(!(tend>0)) return [0];
  const set=new Set();
  const coarseN=4000, cdt=tend/coarseN;
  for(let i=0;i<=coarseN;i++) set.add(i*cdt);
  for(let i=0;i<ndose;i++){
    const t0=i*tau; if(t0>tend) break;
    set.add(t0);                                   // 투여 시점
    if(tinf>0){                                    // 주입 구간 세분 + 종료(피크) 포함
      const fineN=40;
      for(let k=0;k<=fineN;k++){ const tt=t0+tinf*k/fineN; if(tt<=tend) set.add(tt); }
    }
  }
  return [...set].filter(t=>t>=0 && t<=tend+1e-9).sort((a,b)=>a-b);
}

function simulate(model, indiv, dosing, grid){
  const cmt=model.structure.cmt, absn=model.structure.absorption;
  const { dose, tinf, tau, ndose } = dosing;
  const CL=indiv.CL, Vc=indiv.Vc, Vp=indiv.Vp, Q=indiv.Q, ka=indiv.ka, F=(indiv.F!=null?indiv.F:1);
  const k10=CL/Vc, k12=(cmt===2&&Q!=null&&Vc)?Q/Vc:0, k21=(cmt===2&&Q!=null&&Vp)?Q/Vp:0;
  const infuse=(!absn && tinf>0);
  const useMM=(model.Km!=null && model.Vm!=null), Km=model.Km, Vm=model.Vm;  // Michaelis-Menten 포화 소실
  // 스텝 [t, t+h]와 주입창의 겹침으로 평균 주입속도 산출 → 불연속 경계에서도 질량 정확 보존
  function rateOverStep(t, h){
    if(!infuse || h<=0) return 0;
    let overlap=0;
    for(let i=0;i<ndose;i++){ const a=i*tau, b=a+tinf; const lo=Math.max(t,a), hi=Math.min(t+h,b); if(hi>lo) overlap+=(hi-lo); }
    return (overlap/h)*(dose/tinf);
  }
  const deriv=(t,y,rate)=>{
    const dDepot = absn ? -ka*y[0] : 0;
    const inflow = absn ? ka*y[0] : rate;
    const C = y[1]/Vc;
    const mmElim = useMM ? (Vm*C/(Km+C)) : 0;   // 선형 CL과 병렬로 작동하는 포화 소실항
    const dC = inflow - k10*y[1] - mmElim - k12*y[1] + k21*y[2];
    const dP = (cmt===2) ? (k12*y[1]-k21*y[2]) : 0;
    return [dDepot,dC,dP];
  };
  const times = grid || buildTimeGrid(dosing);
  const nt=times.length, conc=new Array(nt);
  let y=[0,0,0];
  const bolus=[]; for(let i=0;i<ndose;i++) bolus.push(i*tau); let bi=0;
  for(let i=0;i<nt;i++){
    const t=times[i];
    while(bi<bolus.length && t>=bolus[bi]-1e-9){    // 투여 시점에 depot/central bolus 주입
      if(absn) y[0]+=dose*F; else if(!infuse) y[1]+=dose;
      bi++;
    }
    conc[i]=y[1]/Vc;                                // bolus/주입종료가 격자점이라 피크 정확히 기록
    if(i<nt-1){
      const h=times[i+1]-times[i];
      const rs=rateOverStep(t,h);                   // 스텝 전체에 일정한 평균 주입속도 사용
      const k1=deriv(t,y,rs);
      const k2=deriv(t+h/2,[y[0]+h/2*k1[0],y[1]+h/2*k1[1],y[2]+h/2*k1[2]],rs);
      const k3=deriv(t+h/2,[y[0]+h/2*k2[0],y[1]+h/2*k2[1],y[2]+h/2*k2[2]],rs);
      const k4=deriv(t+h,[y[0]+h*k3[0],y[1]+h*k3[1],y[2]+h*k3[2]],rs);
      y=[y[0]+h/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]),
         y[1]+h/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]),
         y[2]+h/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2])];
    }
  }
  return {times, conc};
}

// ---------- 개체 샘플링 (IIV) ----------
function sampleIndiv(model, typ, P, assumedCV){
  const indiv=Object.assign({}, typ);
  if(model.iiv){
    const keys=Object.keys(model.iiv).filter(k=>model.iiv[k]);
    const z={}; keys.forEach(k=>z[k]=randn());
    if(model.corr){ const rho=(P[model.corr.rho]||0), a=model.corr.a, b=model.corr.b;
      if(z[a]!=null&&z[b]!=null) z[b]=rho*z[a]+Math.sqrt(Math.max(0,1-rho*rho))*z[b]; }
    keys.forEach(k=>{ const om=omega(P[model.iiv[k]]); if(typ[k]!=null) indiv[k]=typ[k]*Math.exp(om*z[k]); });
  } else {
    const om=omega(assumedCV);
    if(typ.CL!=null) indiv.CL=typ.CL*Math.exp(om*randn());
    if(typ.Vc!=null) indiv.Vc=typ.Vc*Math.exp(om*randn());
  }
  return indiv;
}

function percentile(sorted, p){
  const idx=(sorted.length-1)*p, lo=Math.floor(idx), hi=Math.ceil(idx);
  if(lo===hi) return sorted[lo];
  return sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo);
}

// ---------- 요약 지표: Cmax, Ctrough, AUC, 말기 반감기 (typical 프로파일 기준) ----------
function computeMetrics(times, conc, dosing){
  const { tau, ndose, tend } = dosing;
  const n=times.length;
  const cmax = Math.max(...conc);
  let auc=0; for(let i=1;i<n;i++) auc += (conc[i]+conc[i-1])/2*(times[i]-times[i-1]); // 사다리꼴
  // 마지막 투여 구간 [t_ld, t_ld+tau]
  const tld=(ndose-1)*tau, tEndInt=Math.min(tld+tau, tend);
  const idxLast=[]; for(let i=0;i<n;i++){ if(times[i]>=tld-1e-9 && times[i]<=tEndInt+1e-9) idxLast.push(i); }
  let cmaxSS=null, ctrough=conc[n-1], aucTau=null;
  if(idxLast.length){
    cmaxSS=Math.max(...idxLast.map(i=>conc[i]));
    ctrough=conc[idxLast[idxLast.length-1]];
    aucTau=0; for(let k=1;k<idxLast.length;k++){ const i=idxLast[k], j=idxLast[k-1]; aucTau+=(conc[i]+conc[j])/2*(times[i]-times[j]); }
  }
  // 말기 반감기: 전체 프로파일의 하강 꼬리(끝 20%, 투여 후 washout)에서 ln(C)~t 회귀
  let thalf=null;
  {
    const tailStart=times[n-1]-0.20*(times[n-1]-times[0]);
    const seg=[]; for(let i=0;i<n;i++){ if(times[i]>=tailStart && conc[i]>0) seg.push(i); }
    if(seg.length>=2){
      const xs=seg.map(i=>times[i]), ys=seg.map(i=>Math.log(conc[i]));
      const nx=xs.length, sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
      const sxx=xs.reduce((a,b)=>a+b*b,0), sxy=xs.reduce((a,b,k)=>a+b*ys[k],0);
      const den=nx*sxx-sx*sx;
      if(den!==0){ const slope=(nx*sxy-sx*sy)/den; if(slope<0) thalf=Math.log(2)/(-slope); }
    }
  }
  return { cmax, cmaxSS, ctrough, auc, aucTau, thalf };
}

  const box=document.getElementById('metrics'); if(!box) return;
  const u=M.concUnit, tu=M.timeLabel;
  const fmt=v=> (v==null||isNaN(v))?'–':(v>=100?v.toFixed(0):v>=1?v.toFixed(2):v.toPrecision(3));
  box.innerHTML =
    `<div class="mtitle">요약 지표 (typical 기준)</div>
     <div class="metrics">
       <div class="mcard"><div class="mlab">Cmax (전체 최고)</div><div class="mval">${fmt(m.cmax)} <span>${u}</span></div></div>
       <div class="mcard"><div class="mlab">Cmax,ss (마지막 구간)</div><div class="mval">${fmt(m.cmaxSS)} <span>${u}</span></div></div>
       <div class="mcard"><div class="mlab">Ctrough (마지막 구간 끝)</div><div class="mval">${fmt(m.ctrough)} <span>${u}</span></div></div>
       <div class="mcard"><div class="mlab">AUC (0–종료)</div><div class="mval">${fmt(m.auc)} <span>${u}·${tu}</span></div></div>
       <div class="mcard"><div class="mlab">AUC,τ (마지막 구간)</div><div class="mval">${fmt(m.aucTau)} <span>${u}·${tu}</span></div></div>
       <div class="mcard"><div class="mlab">말기 반감기${M.hasMM?' *':''}</div><div class="mval">${fmt(m.thalf)} <span>${tu}</span></div></div>
     </div>
     ${M.hasMM?'<div class="mnote">* 비선형(MM) 모델은 반감기가 농도에 따라 달라짐 — 말기 구간 근사값</div>':''}`;
}

// ---------- 실행 ----------
function run(){
  const M=CURRENT;
  if(!M){ setStatus('약물/모델을 먼저 선택하세요.'); return; }
  const covEl=id=>document.getElementById(id);
  const cov={
    wt: parseFloat(covEl('cov_wt').value),
    sex: covEl('cov_sex') ? parseInt(covEl('cov_sex').value) : 0,
    alb: covEl('cov_alb') ? parseFloat(covEl('cov_alb').value) : null
  };
  const tinfH = parseFloat(document.getElementById('tinf').value);   // 입력은 시간(h)
  const dosing={
    dose:parseFloat(document.getElementById('dose').value),
    tinf: (M.timeUnit==='day' ? tinfH/24 : tinfH),                   // 모델 시간단위로 변환
    tau:parseFloat(document.getElementById('tau').value),
    ndose:parseInt(document.getElementById('ndose').value),
    tend:parseFloat(document.getElementById('tend').value)
  };
  const useMC=document.getElementById('mc').checked;
  const N=useMC?Math.max(1,parseInt(document.getElementById('nsub').value)):1;
  const assumedCV=parseFloat(document.getElementById('assumedcv').value);
  const P = M.source==='curated' ? (()=>{const o={};for(const k in PARAMS[document.getElementById('drug').value])o[k]=PARAMS[document.getElementById('drug').value][k].estimate;return o;})() : {};

  const grid=buildTimeGrid(dosing);   // 이벤트 인식형 격자를 1회 생성해 모든 개체가 공유
  const typ=M.build(cov);
  const base=simulate(M, typ, dosing, grid);
  const nt=base.times.length;

  const times=base.times;
  let traces=[];
  if(useMC){
    const all=Array.from({length:nt},()=>[]);
    for(let s=0;s<N;s++){
      const indiv=sampleIndiv(M, typ, P, assumedCV);
      const r=simulate(M, indiv, dosing, grid);
      for(let i=0;i<nt;i++) all[i].push(r.conc[i]);
    }
    const med=new Array(nt), p5=new Array(nt), p95=new Array(nt);
    for(let i=0;i<nt;i++){ const col=all[i].slice().sort((a,b)=>a-b);
      med[i]=percentile(col,0.5); p5[i]=percentile(col,0.05); p95[i]=percentile(col,0.95); }
    traces=[
      {x:times.concat(times.slice().reverse()), y:p95.concat(p5.slice().reverse()),
       fill:'toself', fillcolor:'rgba(56,189,248,0.18)', line:{width:0}, name:'5–95% 밴드 (개체간 변동 IIV)', hoverinfo:'skip'},
      {x:times, y:med, mode:'lines', line:{color:'#38bdf8',width:2.5}, name:'중앙값 (median)'},
      {x:times, y:base.conc, mode:'lines', line:{color:'#f59e0b',width:1.5,dash:'dot'}, name:'Typical (point est.)'}
    ];
    lastResult={times, median:med, p5, p95, typical:base.conc};
  } else {
    traces=[{x:times, y:base.conc, mode:'lines', line:{color:'#38bdf8',width:2.5}, name:'Typical profile'}];
    lastResult={times, typical:base.conc};
  }

  const logy=document.getElementById('logy').checked;
  Plotly.newPlot('plot', traces, {
    paper_bgcolor:'#1e293b', plot_bgcolor:'#0b1220', font:{color:'#e2e8f0'},
    title:{text:M.label, font:{size:14}},
    xaxis:{title:'Time ('+M.timeLabel+')', gridcolor:'#334155'},
    yaxis:{title:'Concentration ('+M.concUnit+')', gridcolor:'#334155', type: logy?'log':'linear'},
    legend:{orientation:'h', y:-0.18}, margin:{t:40,r:20,b:60,l:60}
  }, {responsive:true});

  renderMetrics(M, computeMetrics(times, base.conc, dosing));
  document.getElementById('plotNote').innerHTML = useMC
    ? '밴드 = <b>개체간 변동(IIV)</b>만 반영 (log-normal). 잔차·분석오차(관측농도 산포)는 <b>미포함</b> — 관측치 산점도와 직접 비교 시 주의.'
    : '';

  const src = M.source==='curated' ? 'IIV(published)' : `가정 IIV ${assumedCV}%CV`;
  setStatus(`완료 · N=${N} · 시점 ${nt}개 · ${useMC?src:'point est.'}`, true);
}

function exportCSV(){
  if(!lastResult){ setStatus('먼저 시뮬레이션을 실행하세요.'); return; }
  const L=lastResult; let rows=[];
  if(L.median){ rows.push('time,median,p5,p95,typical');
    for(let i=0;i<L.times.length;i++) rows.push([L.times[i],L.median[i],L.p5[i],L.p95[i],L.typical[i]].join(',')); }
  else { rows.push('time,concentration');
    for(let i=0;i<L.times.length;i++) rows.push([L.times[i],L.typical[i]].join(',')); }
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='pk_simulation_result.csv'; a.click();
}

// ---------- 부팅 ----------
document.getElementById('drug').addEventListener('change', onDrugChange);
document.getElementById('model').addEventListener('change', onModelChange);
document.getElementById('run').addEventListener('click', run);
document.getElementById('export').addEventListener('click', exportCSV);
document.getElementById('libFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ ingestLibrary(rd.result); populateDrugs(); }; rd.readAsText(f);
});
document.getElementById('csvFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ ingestCurated(rd.result); populateDrugs(); }; rd.readAsText(f);
});
document.getElementById('regFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ ingestRegimen(rd.result); if(CURRENT) onModelChange(); }; rd.readAsText(f);
});

// 검증용 디버그 훅 (콘솔에서 MM on/off 비교 가능)
window.__PK = { simulate, get DRUGS(){ return DRUGS; } };

// 부팅: (1) 파일에 내장된 CSV가 있으면 그것으로 즉시 로드(더블클릭도 동작),
//       (2) 없으면 같은 폴더의 CSV를 fetch (서버/Vercel 배포용)
(function boot(){
  const embCur=document.getElementById('data-curated');
  const embLib=document.getElementById('data-library');
  const embReg=document.getElementById('data-regimen');
  const hasEmbed=(embCur&&embCur.textContent.trim()) || (embLib&&embLib.textContent.trim());
  if(hasEmbed){
    try{
      if(embCur&&embCur.textContent.trim()) ingestCurated(embCur.textContent);
      if(embLib&&embLib.textContent.trim()) ingestLibrary(embLib.textContent);
      if(embReg&&embReg.textContent.trim()) ingestRegimen(embReg.textContent);
      if(Object.keys(DRUGS).length){ populateDrugs(); return; }
    }catch(err){ setStatus('내장 데이터 파싱 오류: '+err.message); return; }
  }
  Promise.allSettled([
    fetch('extracted_poppk_params.csv').then(r=>{ if(!r.ok) throw 0; return r.text(); }).then(t=>ingestCurated(t)),
    fetch('PPKPARAMETER.csv').then(r=>{ if(!r.ok) throw 0; return r.text(); }).then(t=>ingestLibrary(t)),
    fetch('regimen.csv').then(r=>{ if(!r.ok) throw 0; return r.text(); }).then(t=>ingestRegimen(t))
  ]).then(()=>{
    if(Object.keys(DRUGS).length){ populateDrugs(); }
    else setStatus('자동 로드 실패(file:// 제한). 위에서 CSV를 직접 선택하거나 단일파일 버전을 사용하세요.');
  });
})();
</script>
