<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PopPK Profile Simulator</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --border:#334155; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", system-ui, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:18px 24px; background:linear-gradient(90deg,#0ea5e9,#6366f1); color:#fff; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; font-size:13px; opacity:.9; }
  .layout { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .controls { flex:0 0 320px; }
  .plotwrap { flex:1 1 560px; min-width:480px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input, select { width:100%; padding:7px 9px; background:#0b1220; color:var(--text);
    border:1px solid var(--border); border-radius:6px; font-size:14px; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  button { margin-top:14px; width:100%; padding:10px; background:var(--accent); color:#06283d;
    border:none; border-radius:7px; font-weight:600; font-size:14px; cursor:pointer; }
  button.secondary { background:#475569; color:#fff; margin-top:8px; }
  button:hover { filter:brightness(1.08); }
  .toggle { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .toggle input { width:auto; }
  #status { font-size:12px; color:var(--muted); margin-top:10px; min-height:16px; }
  .pill { display:inline-block; padding:2px 8px; background:#0b1220; border:1px solid var(--border);
    border-radius:12px; font-size:11px; color:var(--accent); margin:2px 4px 2px 0; }
  table.params { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
  table.params td { padding:3px 6px; border-bottom:1px solid var(--border); }
  table.params td:first-child { color:var(--muted); }
  details { margin-top:12px; }
  summary { cursor:pointer; font-size:13px; color:var(--accent); }
  h3 { margin:0 0 4px; font-size:15px; }
</style>
</head>
<body>
<header>
  <h1>PopPK 농도-시간 프로파일 시뮬레이터</h1>
  <p>Source: extracted_poppk_params.csv (Eculizumab 2-compartment IV · Adalimumab 1-compartment first-order absorption) · Monte-Carlo virtual patients</p>
</header>

<div class="layout">
  <div class="panel controls">
    <h3>1. 파라미터 소스</h3>
    <div id="status">CSV 로딩 중...</div>
    <label>CSV를 자동으로 못 읽으면 직접 선택</label>
    <input type="file" id="csvFile" accept=".csv">

    <h3 style="margin-top:18px;">2. 약물 / 모델</h3>
    <select id="drug"></select>
    <div id="modelDesc" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>

    <h3 style="margin-top:18px;">3. 투여 설정</h3>
    <div class="row">
      <div><label>1회 용량 (mg)</label><input type="number" id="dose" value="900" step="any"></div>
      <div><label id="ivLabel">주입시간 (h)</label><input type="number" id="tinf" value="0.5" step="any"></div>
    </div>
    <div class="row">
      <div><label id="intervalLabel">투여 간격 (h)</label><input type="number" id="tau" value="168" step="any"></div>
      <div><label>투여 횟수</label><input type="number" id="ndose" value="4" step="1" min="1"></div>
    </div>
    <div class="row">
      <div><label>체중 (kg)</label><input type="number" id="wt" value="80.9" step="any"></div>
      <div><label>성별 (adalimumab)</label>
        <select id="sex"><option value="0">여성(F)</option><option value="1">남성(M)</option></select></div>
    </div>
    <div class="row">
      <div><label id="simEndLabel">시뮬레이션 종료 (h)</label><input type="number" id="tend" value="1344" step="any"></div>
      <div><label>가상환자 수 (N)</label><input type="number" id="nsub" value="300" step="50" min="1"></div>
    </div>

    <div class="toggle"><input type="checkbox" id="mc" checked><label style="margin:0">Monte-Carlo 변동성 (5–95% 밴드)</label></div>
    <div class="toggle"><input type="checkbox" id="logy"><label style="margin:0">세미로그 (log Y)</label></div>

    <button id="run">시뮬레이션 실행 ▶</button>
    <button id="export" class="secondary">결과 CSV 내보내기 ⬇</button>

    <details>
      <summary>현재 약물 파라미터 보기</summary>
      <table class="params" id="paramTable"></table>
    </details>
  </div>

  <div class="panel plotwrap">
    <div id="plot" style="width:100%;height:600px;"></div>
  </div>
</div>

<script>
// ---------- 모델 정의 (추출 CSV에는 구조 메타가 없으므로 약물별 모델을 여기서 매핑) ----------
const MODELS = {
  eculizumab: {
    label: "Eculizumab — 2-compartment, IV infusion",
    type: "2cmt_iv",
    timeUnit: "h", timeLabel: "h", concUnit: "mg/L",
    note: "CL=θ1·(WT/80.9)^θ7 , Vc=θ2·(WT/80.9)^θ8 (healthy). 단위: L/h, L.",
    refWT: 80.9,
    // 추출 파라미터 key → 사용
    build(P, wt, sex) {
      const CL = P.CL * Math.pow(wt/80.9, P.theta7_WT_CL);
      const Vc = P.Vc * Math.pow(wt/80.9, P.theta8_WT_Vc);
      const Vp = P.Vp;
      const Q  = P.Q;
      return { CL, Vc, Vp, Q };
    },
    iiv: { CL:"IIV_CL", Vc:"IIV_Vc", Vp:"IIV_Vp" },
    corr: { a:"CL", b:"Vc", rho:"corr_CL_Vc" },
    defaults: { dose:900, tinf:0.5, tau:168, ndose:4, tend:1344, wt:80.9 }
  },
  adalimumab: {
    label: "Adalimumab — 1-compartment, first-order absorption (SC)",
    type: "1cmt_ka",
    timeUnit: "day", timeLabel: "day", concUnit: "mg/L",
    note: "CL/F = θ·exp(SX_CL·sex)·(WT/70)^WT_CL approx. 단위: L/day, L. (SC, F 포함된 apparent 값)",
    refWT: 70,
    build(P, wt, sex) {
      // 공변량: 성별(SX_CL), 체중(WT_CL). 논문은 power/exponential 형태 — 합리적 근사 적용.
      const CL = P["CL/F"] * Math.exp((P.SX_CL||0) * (sex)) * Math.pow(wt/70, (P.WT_CL||0));
      const V  = P["V/F"];
      const ka = P.ka;
      return { CL, V, ka };
    },
    iiv: { CL:"IIV_CL", V:"IIV_Vd", ka:null },
    corr: null,
    defaults: { dose:40, tinf:0, tau:14, ndose:8, tend:168, wt:70 }
  }
};

// ---------- 파라미터 저장소 ----------
let PARAMS = {};   // PARAMS[drug][parameter] = {estimate, rse}
let lastResult = null;

function setStatus(msg, ok){ const s=document.getElementById('status'); s.textContent=msg; s.style.color = ok? '#4ade80':'#94a3b8'; }

function ingestCSV(text){
  const parsed = Papa.parse(text.trim(), {header:true, skipEmptyLines:true});
  PARAMS = {};
  parsed.data.forEach(r=>{
    const d=(r.drug||'').trim(); const p=(r.parameter||'').trim();
    if(!d||!p) return;
    if(!PARAMS[d]) PARAMS[d]={};
    PARAMS[d][p] = { estimate: r.estimate===''?null:parseFloat(r.estimate),
                     rse: r.rse===''?null:parseFloat(r.rse),
                     description: r.description||'' };
  });
  const drugs = Object.keys(PARAMS).filter(d=>MODELS[d]);
  const sel=document.getElementById('drug'); sel.innerHTML='';
  drugs.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=MODELS[d].label; sel.appendChild(o); });
  if(drugs.length){ onDrugChange(); setStatus('CSV 로드 완료 · 약물 '+drugs.length+'종 인식', true); }
  else setStatus('인식 가능한 약물이 없습니다 (eculizumab/adalimumab).');
}

// 추출 파라미터를 estimate 숫자 dict로 변환
function estDict(drug){
  const out={}; const src=PARAMS[drug]||{};
  for(const k in src) out[k]= src[k].estimate;
  return out;
}

function onDrugChange(){
  const drug=document.getElementById('drug').value;
  const M=MODELS[drug];
  document.getElementById('modelDesc').textContent = M.note;
  // 시간 단위 라벨 갱신
  const u=M.timeUnit;
  document.getElementById('intervalLabel').textContent='투여 간격 ('+u+')';
  document.getElementById('simEndLabel').textContent='시뮬레이션 종료 ('+u+')';
  document.getElementById('ivLabel').textContent = M.type==='2cmt_iv' ? '주입시간 ('+u+')' : '주입시간 (미사용)';
  // 기본값 적용
  const d=M.defaults;
  document.getElementById('dose').value=d.dose;
  document.getElementById('tinf').value=d.tinf;
  document.getElementById('tau').value=d.tau;
  document.getElementById('ndose').value=d.ndose;
  document.getElementById('tend').value=d.tend;
  document.getElementById('wt').value=d.wt;
  // 파라미터 테이블
  const tb=document.getElementById('paramTable'); tb.innerHTML='';
  const src=PARAMS[drug];
  for(const k in src){
    const tr=document.createElement('tr');
    const v=src[k].estimate, rse=src[k].rse;
    tr.innerHTML=`<td>${k}</td><td>${v==null?'–':v}</td><td style="color:#94a3b8">RSE ${rse==null?'–':rse}%</td>`;
    tb.appendChild(tr);
  }
}

// ---------- 난수 (정규/표준정규, Box–Muller) ----------
function randn(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

// ---------- ODE 적분기 (RK4), 다회 투여 + IV infusion / 1차 흡수 ----------
// 상태: 2cmt_iv -> [A_central, A_periph]; 1cmt_ka -> [A_depot, A_central]
function simulate(drug, indiv, dosing){
  const M=MODELS[drug];
  const { dose, tinf, tau, ndose, tend } = dosing;
  const dt = Math.max(tend/4000, 1e-6);
  const nt = Math.floor(tend/dt)+1;
  const times=new Array(nt), conc=new Array(nt);

  let deriv, y, conc_of;
  if(M.type==='2cmt_iv'){
    const {CL,Vc,Vp,Q}=indiv;
    const k10=CL/Vc, k12=Q/Vc, k21=Q/Vp;
    y=[0,0];
    deriv=(t,y,rate)=>[ rate - (k10+k12)*y[0] + k21*y[1], k12*y[0]-k21*y[1] ];
    conc_of=(y)=> y[0]/Vc;
  } else { // 1cmt_ka
    const {CL,V,ka}=indiv;
    const ke=CL/V;
    y=[0,0];
    deriv=(t,y,rate)=>[ rate - ka*y[0], ka*y[0] - ke*y[1] ];  // depot, central
    conc_of=(y)=> y[1]/V;
  }

  // 투여 이벤트: IV infusion이면 구간 rate, 흡수모델이면 depot bolus
  const infuse = (M.type==='2cmt_iv' && tinf>0);
  function rateAt(t){
    if(!infuse) return 0;
    let r=0;
    for(let i=0;i<ndose;i++){ const t0=i*tau; if(t>=t0 && t<t0+tinf) r+=dose/tinf; }
    return r;
  }
  // bolus 시점 집합 (흡수모델: depot에, 또는 IV에서 tinf=0이면 central에)
  const bolusTimes=[]; for(let i=0;i<ndose;i++) bolusTimes.push(i*tau);
  let bi=0;

  for(let i=0;i<nt;i++){
    const t=i*dt;
    // bolus 주입 (현재 t가 투여시점을 막 지났을 때)
    while(bi<bolusTimes.length && t>=bolusTimes[bi]-1e-9){
      if(M.type==='1cmt_ka') y[0]+=dose;            // depot
      else if(!infuse) y[0]+=dose;                  // IV bolus → central
      bi++;
    }
    times[i]=t; conc[i]=conc_of(y);
    // RK4 step
    const r=rateAt(t);
    const k1=deriv(t,y,r);
    const k2=deriv(t+dt/2, y.map((v,j)=>v+dt/2*k1[j]), rateAt(t+dt/2));
    const k3=deriv(t+dt/2, y.map((v,j)=>v+dt/2*k2[j]), rateAt(t+dt/2));
    const k4=deriv(t+dt,   y.map((v,j)=>v+dt*k3[j]),   rateAt(t+dt));
    y=y.map((v,j)=>v+dt/6*(k1[j]+2*k2[j]+2*k3[j]+k4[j]));
  }
  return {times, conc};
}

function percentile(sorted, p){
  const idx=(sorted.length-1)*p; const lo=Math.floor(idx), hi=Math.ceil(idx);
  if(lo===hi) return sorted[lo];
  return sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo);
}

function run(){
  const drug=document.getElementById('drug').value;
  if(!drug){ setStatus('약물을 먼저 선택하세요.'); return; }
  const M=MODELS[drug];
  const P=estDict(drug);
  const wt=parseFloat(document.getElementById('wt').value);
  const sex=parseInt(document.getElementById('sex').value);
  const dosing={
    dose: parseFloat(document.getElementById('dose').value),
    tinf: parseFloat(document.getElementById('tinf').value),
    tau:  parseFloat(document.getElementById('tau').value),
    ndose:parseInt(document.getElementById('ndose').value),
    tend: parseFloat(document.getElementById('tend').value)
  };
  const useMC=document.getElementById('mc').checked;
  const N = useMC ? Math.max(1, parseInt(document.getElementById('nsub').value)) : 1;

  // typical individual
  const typ = M.build(P, wt, sex);

  // IIV(% CV) → log-normal omega (SD on log scale): omega = sqrt(ln(1+CV^2))
  function omega(cvPct){ if(cvPct==null||isNaN(cvPct)) return 0; const cv=cvPct/100; return Math.sqrt(Math.log(1+cv*cv)); }

  // 기준 시뮬(typical)으로 시간축 확보
  const base = simulate(drug, typ, dosing);
  const nt=base.times.length;
  const all = useMC ? Array.from({length:nt},()=>[]) : null;

  for(let s=0; s<N; s++){
    let indiv;
    if(!useMC){ indiv=typ; }
    else {
      indiv=Object.assign({}, typ);
      // 상관 적용 (eculizumab: CL–Vc)
      let zMap={};
      const keys=Object.keys(M.iiv).filter(k=>M.iiv[k]);
      keys.forEach(k=> zMap[k]=randn());
      if(M.corr){
        const rho=P[M.corr.rho]||0;
        const a=M.corr.a, b=M.corr.b;
        // b를 a와 상관시키기
        zMap[b] = rho*zMap[a] + Math.sqrt(Math.max(0,1-rho*rho))*zMap[b];
      }
      keys.forEach(k=>{
        const om=omega(P[M.iiv[k]]);
        indiv[k] = typ[k]*Math.exp(om*zMap[k]);
      });
    }
    if(s===0 && useMC){ /* still simulate */ }
    if(useMC){
      const r=simulate(drug, indiv, dosing);
      for(let i=0;i<nt;i++) all[i].push(r.conc[i]);
    }
  }

  const times=base.times;
  let traces=[];
  if(useMC){
    const med=new Array(nt), p5=new Array(nt), p95=new Array(nt);
    for(let i=0;i<nt;i++){ const col=all[i].slice().sort((a,b)=>a-b);
      med[i]=percentile(col,0.5); p5[i]=percentile(col,0.05); p95[i]=percentile(col,0.95); }
    traces=[
      {x:times.concat(times.slice().reverse()), y:p95.concat(p5.slice().reverse()),
       fill:'toself', fillcolor:'rgba(56,189,248,0.18)', line:{width:0}, name:'5–95% 밴드', hoverinfo:'skip'},
      {x:times, y:med, mode:'lines', line:{color:'#38bdf8',width:2.5}, name:'중앙값 (median)'},
      {x:times, y:base.conc, mode:'lines', line:{color:'#f59e0b',width:1.5,dash:'dot'}, name:'Typical (point est.)'}
    ];
    lastResult={times, median:med, p5, p95, typical:base.conc};
  } else {
    traces=[{x:times, y:base.conc, mode:'lines', line:{color:'#38bdf8',width:2.5}, name:'Typical profile'}];
    lastResult={times, typical:base.conc};
  }

  const logy=document.getElementById('logy').checked;
  Plotly.newPlot('plot', traces, {
    paper_bgcolor:'#1e293b', plot_bgcolor:'#0b1220', font:{color:'#e2e8f0'},
    title:{text:M.label, font:{size:14}},
    xaxis:{title:'Time ('+M.timeLabel+')', gridcolor:'#334155'},
    yaxis:{title:'Concentration ('+M.concUnit+')', gridcolor:'#334155', type: logy?'log':'linear'},
    legend:{orientation:'h', y:-0.18}, margin:{t:40,r:20,b:60,l:60}
  }, {responsive:true});

  setStatus(`완료 · N=${N} · 시점 ${nt}개`, true);
}

function exportCSV(){
  if(!lastResult){ setStatus('먼저 시뮬레이션을 실행하세요.'); return; }
  const L=lastResult; let rows=[];
  if(L.median){ rows.push('time,median,p5,p95,typical');
    for(let i=0;i<L.times.length;i++) rows.push([L.times[i],L.median[i],L.p5[i],L.p95[i],L.typical[i]].join(',')); }
  else { rows.push('time,concentration');
    for(let i=0;i<L.times.length;i++) rows.push([L.times[i],L.typical[i]].join(',')); }
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='pk_simulation_result.csv'; a.click();
}

// ---------- 부팅: CSV 자동 로드 시도 ----------
document.getElementById('drug').addEventListener('change', onDrugChange);
document.getElementById('run').addEventListener('click', run);
document.getElementById('export').addEventListener('click', exportCSV);
document.getElementById('csvFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>ingestCSV(rd.result); rd.readAsText(f);
});

fetch('extracted_poppk_params.csv').then(r=>{ if(!r.ok) throw 0; return r.text(); })
  .then(t=>ingestCSV(t))
  .catch(()=> setStatus('자동 로드 실패(file:// 제한). 위에서 extracted_poppk_params.csv를 직접 선택하세요.'));
</script>
</body>
</html>
